# ============================================================
# ULTREC — Site Content Configuration
# ============================================================
# This file is the single source of truth for all editable
# site content: hero image, product carousel, and the
# Dispositivos catalog.
#
# HOW TO USE
# ----------
# • Change `image:` to any filename inside the Imgs/ folder.
#   If the file doesn't exist the site falls back to placeholder.png.
# • Add or remove items under `carousel` or any product category.
# • `variants` is optional — omit the key or leave it empty ([])
#   if the product has no model variants.
# • The `identification` grid is also editable here.
# ============================================================


# ------------------------------------------------------------
# HERO
# Background image for the home-page hero section.
# Supports .jpg or .png — must exist in Imgs/
# ------------------------------------------------------------
hero:
  image: hero-img.jpg


# ------------------------------------------------------------
# CAROUSEL
# Shown on the home page. Add or remove slides freely.
# Fields: name, image, description
# ------------------------------------------------------------
carousel:
  - name: Torniquete Bidireccional en Acero al Carbón — Modelo Premium
    image: dispositivo-1.png
    description: Control de acceso de cuerpo completo en acero negro. Bidireccional, apto para entornos industriales de alto tráfico.

  - name: Torniquete Bidireccional en Acero Inoxidable — Modelo Premium
    image: dispositivo-2.png
    description: Control de acceso de cuerpo completo en acero inoxidable. Mayor resistencia a la corrosión.

  - name: Torniquete Doble Peine en Acero al Carbón — Modelo Premium
    image: dispositivo-3.png
    description: Diseño doble peine en acero negro. Estructura robusta para entornos de alta seguridad.

  - name: Torniquete Doble Peine en Acero Inoxidable — Modelo Premium
    image: dispositivo-4.png
    description: Doble peine en acero inoxidable. Acabado premium, resistente a la corrosión y vandalismo.

  - name: Control de Acceso 2 Puertas Doble Multimoneda Reforzado
    image: dispositivo-5.png
    description: Modelo doble con dos monederos multimoneda y estructura reforzada. Ideal para instalaciones de alto tráfico.

  - name: Control de Acceso 1 Puerta
    image: dispositivo-6.png
    description: Modelo individual con monedero multimoneda. Control de acceso con cobro automático integrado.

  - name: Máquina Vending Mecánica de 2 Resortes
    image: placeholder.png
    description: Máquina expendedora mecánica para la venta de toallas sanitarias.

  - name: Máquina Vending Mecánica de 3 Resortes
    image: placeholder.png
    description: Máquina expendedora mecánica para la venta de toallas sanitarias.

  - name: Máquina Vending Mecánica de 4 Resortes
    image: placeholder.png
    description: Máquina expendedora mecánica para la venta de toallas sanitarias.

  - name: Refacciones
    image: placeholder.png
    description: Piezas de repuesto originales para todos los modelos ULTREC.


# ------------------------------------------------------------
# DISPOSITIVOS PAGE
# Products are grouped into categories. Each category has a
# title and a list of products.
# Each product: name, image, description, variants (optional)
# ------------------------------------------------------------
dispositivos:
  categories:
    - id: torniquetes
      title: Torniquetes de Cuerpo Completo
      products:
        - name: Torniquete Bidireccional en Acero al Carbón
          image: dispositivo-1.png
          description: Control de acceso de cuerpo completo en acero negro. Bidireccional, apto para entornos industriales de alto tráfico.
          variants: [Básico, Universal, Plus, Premium]

        - name: Torniquete Bidireccional en Acero Inoxidable
          image: dispositivo-2.png
          description: Control de acceso de cuerpo completo en acero inoxidable. Mayor resistencia a la corrosión, ideal para espacios con humedad o uso intensivo.
          variants: [Básico, Universal, Plus, Premium]

        - name: Torniquete Doble Peine en Acero al Carbón
          image: dispositivo-3.png
          description: Diseño doble peine en acero negro. Estructura robusta para entornos de alta seguridad.
          variants: [Básico, Universal, Plus, Premium]

        - name: Torniquete Doble Peine en Acero Inoxidable
          image: dispositivo-4.png
          description: Doble peine en acero inoxidable. Acabado premium, resistente a la corrosión y vandalismo.
          variants: [Básico, Universal, Plus, Premium]

    - id: acceso
      title: Control de Acceso
      products:
        - name: Control de Acceso 1 Puerta
          image: dispositivo-5.png
          description: Modelo individual con monedero multimoneda. Control de acceso con cobro automático integrado.

        - name: Control de Acceso 2 Puertas Doble Multimoneda Reforzado
          image: dispositivo-6.png
          description: Modelo doble con dos monederos multimoneda y estructura reforzada. Ideal para instalaciones de alto tráfico que requieren control simultáneo de dos accesos. Sistema de seguridad reforzado.

    - id: vending
      title: Máquinas Expendedoras (Vending)
      products:
        - name: Máquina Vending Mecánica
          image: placeholder.png
          description: "Máquina expendedora mecánica para la venta de toallas sanitarias. Disponible en configuraciones de 2, 3 o 4 resortes (18 espacios cada uno). Fabricada en acero al carbón cal. 18 con pintura electroestática blanca. Monederos mecánicos configurados para $5 o $10 MXN por unidad."
          variants: [2 resortes, 3 resortes, 4 resortes]

        - name: Máquina de Papel
          image: placeholder.png
          description: Máquina expendedora mecánica para la venta de papel. Diseño robusto para baños de alto tráfico.

  # Identification methods shown as a supporting feature grid
  identification:
    - label: Lector Biométrico de Huella Digital
      description: Identificación por huella dactilar

    - label: Lector de Código de Barras / QR
      description: Lectura de códigos QR y barras

    - label: Control Remoto
      description: Apertura por control remoto

    - label: Tarjeta de Proximidad (RFID)
      description: Acceso por tarjeta o llavero RFID

    - label: Teclado Numérico
      description: Acceso por PIN

    - label: Monedero Multimoneda
      description: Cobro automático por monedas


# ------------------------------------------------------------
# ACCESORIOS PAGE
# Accessories and spare parts offered by ULTREC.
# Same structure as dispositivos: categories with products.
# ------------------------------------------------------------
accesorios:
  categories:
    - id: lectores
      title: Sistemas de Identificación y Lectores
      products:
        - name: Lector Biométrico de Huella Digital
          image: placeholder.png
          description: Módulo de identificación por huella dactilar compatible con todos los modelos ULTREC. Alta precisión y respuesta rápida en entornos de alto tráfico.

        - name: Lector de Tarjeta de Proximidad RFID
          image: placeholder.png
          description: Lector RFID para tarjetas o llaveros de acceso. Frecuencia 125 kHz / 13.56 MHz. Integración directa con torniquetes y controles de acceso ULTREC.

        - name: Lector de Código de Barras y QR
          image: placeholder.png
          description: Módulo de lectura óptica para códigos QR y de barras 1D/2D. Ideal para sistemas de boleto o acceso con código impreso o en pantalla.

        - name: Teclado Numérico de Acceso
          image: placeholder.png
          description: Teclado de PIN resistente a la intemperie. Permite configurar códigos de acceso individuales o grupales.

        - name: Control Remoto
          image: placeholder.png
          description: Control remoto de largo alcance para apertura manual de torniquetes. Incluye receptor de señal para montaje en equipo.

    - id: monederos
      title: Monederos y Sistemas de Cobro
      products:
        - name: Monedero Multimoneda
          image: placeholder.png
          description: Aceptador de monedas configurable para $5 o $10 MXN por paso. Compatible con torniquetes de control de acceso y máquinas vending ULTREC.

        - name: Módulo de Cobro Electrónico
          image: placeholder.png
          description: Sistema de cobro electrónico para integración con lectores de tarjeta o QR de pago. Permite tarifas variables por turno o evento.

    - id: refacciones
      title: Refacciones y Partes
      products:
        - name: Kit de Refacciones para Torniquete
          image: placeholder.png
          description: Piezas de repuesto originales para torniquetes ULTREC. Incluye resortes, ejes, sensores y mecanismos de bloqueo según modelo.

        - name: Cuerpo de Repuesto para Máquina Vending
          image: placeholder.png
          description: Partes estructurales y mecanismos de resorte para máquinas expendedoras mecánicas ULTREC.

        - name: Tarjeta Electrónica de Control
          image: placeholder.png
          description: Tarjeta de control de repuesto para torniquetes y sistemas de acceso ULTREC. Compatible con todas las series actuales.
